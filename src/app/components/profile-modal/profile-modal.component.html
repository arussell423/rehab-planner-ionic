<ion-modal [isOpen]="isOpen" (ionModalDidDismiss)="cancelled.emit()">
  <ng-template>
    <ion-header>
      <ion-toolbar>
        <ion-title>{{ profile ? 'Edit Profile' : 'New Profile' }}</ion-title>
        <ion-buttons slot="end">
          <ion-button (click)="cancelled.emit()">✕</ion-button>
        </ion-buttons>
      </ion-toolbar>
    </ion-header>
    <ion-content class="ion-padding">
      <div class="metric-input" style="margin-bottom:20px">
        <label>Profile Name</label>
        <input class="edit-input" [(ngModel)]="name" placeholder="Enter profile name">
      </div>

      <div class="settings-title">Choose Avatar</div>
      <div class="emoji-grid">
        <div *ngFor="let e of avatarEmojis" class="emoji-option"
          [class.selected]="e === selectedEmoji()" (click)="selectedEmoji.set(e)">{{ e }}</div>
      </div>

      <div class="settings-title" style="margin-top:20px">Choose Theme</div>
      <div class="theme-swatches">
        <div *ngFor="let t of themes" class="theme-swatch"
          [class.active]="t === selectedTheme()"
          [style.background]="themeColor(t)"
          (click)="selectedTheme.set(t)">✓</div>
      </div>

      <div style="display:flex;gap:10px;margin-top:24px;justify-content:flex-end">
        <button class="btn btn-secondary" (click)="cancelled.emit()">Cancel</button>
        <button class="btn btn-primary" (click)="save()">Save</button>
      </div>
    </ion-content>
  </ng-template>
</ion-modal>
