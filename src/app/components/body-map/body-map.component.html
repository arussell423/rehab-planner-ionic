<div class="body-map-wrap">
  <div class="body-map-header">
    <div class="body-map-label">Pain Locations</div>
    <div class="view-toggle">
      <button [class.active]="view === 'front'" (click)="view = 'front'">Front</button>
      <button [class.active]="view === 'back'" (click)="view = 'back'">Back</button>
    </div>
  </div>

  <div class="body-map-svg-wrap">
    <svg viewBox="0 0 200 270" class="body-svg">
      <ellipse cx="100" cy="25" rx="17" ry="20" fill="var(--card-2)" stroke="var(--border)" stroke-width="1.5"/>
      <rect x="93" y="44" width="14" height="14" rx="4" fill="var(--card-2)" stroke="var(--border)" stroke-width="1"/>
      <rect x="68" y="57" width="64" height="78" rx="10" fill="var(--card-2)" stroke="var(--border)" stroke-width="1.5"/>
      <rect x="72" y="133" width="56" height="34" rx="8" fill="var(--card-2)" stroke="var(--border)" stroke-width="1.5"/>
      <rect x="44" y="60" width="22" height="70" rx="10" fill="var(--card-2)" stroke="var(--border)" stroke-width="1.5"/>
      <rect x="134" y="60" width="22" height="70" rx="10" fill="var(--card-2)" stroke="var(--border)" stroke-width="1.5"/>
      <rect x="71" y="166" width="24" height="90" rx="10" fill="var(--card-2)" stroke="var(--border)" stroke-width="1.5"/>
      <rect x="105" y="166" width="24" height="90" rx="10" fill="var(--card-2)" stroke="var(--border)" stroke-width="1.5"/>
      <g *ngFor="let zone of visibleZones">
        <circle
          [attr.cx]="zone.cx" [attr.cy]="zone.cy" [attr.r]="zone.r"
          [attr.fill]="isActive(zone.id) ? '#ef444480' : 'transparent'"
          [attr.stroke]="isActive(zone.id) ? '#ef4444' : 'transparent'"
          stroke-width="2"
          style="cursor:pointer"
          (click)="toggle(zone.id)">
          <title>{{ zone.label }}</title>
        </circle>
      </g>
    </svg>
  </div>

  <div class="body-map-active" *ngIf="painAreas.length > 0">
    <span style="color:#ef4444">📍</span> {{ getActiveLabels() }}
  </div>
  <div class="pain-areas-empty" *ngIf="painAreas.length === 0">
    Tap body areas to mark pain locations
  </div>
</div>
