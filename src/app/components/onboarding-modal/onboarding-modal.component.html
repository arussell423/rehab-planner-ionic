<ion-modal [isOpen]="isOpen" [backdropDismiss]="false">
  <ng-template>
    <ion-header>
      <ion-toolbar>
        <ion-title>Welcome to Rehab Planner! 👋</ion-title>
      </ion-toolbar>
    </ion-header>
    <ion-content class="ion-padding">
      <div class="metric-input" style="margin-bottom:20px">
        <label>Your Name</label>
        <input class="edit-input" [(ngModel)]="name" placeholder="Enter your name">
      </div>

      <div class="settings-title">Choose Your Avatar</div>
      <div class="emoji-grid">
        <div *ngFor="let e of avatarEmojis" class="emoji-option"
          [class.selected]="e === selectedEmoji()" (click)="selectedEmoji.set(e)">{{ e }}</div>
      </div>

      <div class="settings-title" style="margin-top:20px">Choose Your Theme</div>
      <div class="theme-swatches">
        <div *ngFor="let t of themes" class="theme-swatch"
          [class.active]="t === selectedTheme()"
          [style.background]="themeColor(t)"
          (click)="selectedTheme.set(t)">✓</div>
      </div>

      <button class="btn btn-primary" style="width:100%;margin-top:24px" (click)="finish()">
        Get Started 🚀
      </button>
    </ion-content>
  </ng-template>
</ion-modal>
