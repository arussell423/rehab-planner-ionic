<ion-header [translucent]="true">
  <ion-toolbar>
    <ion-buttons slot="start">
      <ion-back-button defaultHref="/activities"></ion-back-button>
    </ion-buttons>
    <ion-title>{{ categoryLabel() }}</ion-title>
    <ion-buttons slot="end">
      <ion-button (click)="openForm()">
        <ion-icon slot="icon-only" name="add-circle-outline"></ion-icon>
      </ion-button>
    </ion-buttons>
  </ion-toolbar>
</ion-header>

<ion-content class="ion-padding-bottom">

  <div *ngIf="activities().length === 0" class="empty-state">
    <div class="empty-icon">🏃</div>
    <div class="empty-text">No activities yet. Tap "+ Add" to create one.</div>
  </div>

  <div class="activity-item" *ngFor="let act of activities()" [class.completed]="act.completed">
    <input type="checkbox" class="act-check" [checked]="act.completed" (change)="toggleComplete(act)">
    <div class="act-body">
      <div class="act-name" [class.done]="act.completed">{{ act.name }}</div>
      <div class="act-chips" *ngIf="activityChips(act)">{{ activityChips(act) }}</div>
      <div class="act-note" *ngIf="act.notes">{{ act.notes }}</div>
    </div>
    <div class="act-tod">{{ act.timeOfDay }}</div>
    <button class="btn-del" (click)="deleteActivity(act.id)" aria-label="Delete">
      <ion-icon name="trash-outline"></ion-icon>
    </button>
  </div>

  <!-- Add Activity Modal -->
  <ion-modal [isOpen]="showForm()" (ionModalDidDismiss)="showForm.set(false)"
    [breakpoints]="[0,0.9]" [initialBreakpoint]="0.9">
    <ng-template>
      <ion-header>
        <ion-toolbar>
          <ion-title>Add Activity</ion-title>
          <ion-buttons slot="end">
            <ion-button (click)="showForm.set(false)">
              <ion-icon slot="icon-only" name="close"></ion-icon>
            </ion-button>
          </ion-buttons>
        </ion-toolbar>
      </ion-header>
      <ion-content class="ion-padding">
        <div class="form-field">
          <label>Name *</label>
          <input class="edit-input" [(ngModel)]="formName" placeholder="e.g. Squats">
        </div>
        <div class="form-field">
          <label>Time of Day</label>
          <div class="seg-btns">
            <button class="seg-btn" [class.active]="formTimeOfDay==='morning'" (click)="formTimeOfDay='morning'">Morning</button>
            <button class="seg-btn" [class.active]="formTimeOfDay==='afternoon'" (click)="formTimeOfDay='afternoon'">Afternoon</button>
            <button class="seg-btn" [class.active]="formTimeOfDay==='evening'" (click)="formTimeOfDay='evening'">Evening</button>
          </div>
        </div>
        <div class="form-row">
          <div class="form-field">
            <label>Sets</label>
            <input class="edit-input" type="number" min="1" [(ngModel)]="formSets" placeholder="—">
          </div>
          <div class="form-field">
            <label>Reps</label>
            <input class="edit-input" type="number" min="1" [(ngModel)]="formReps" placeholder="—">
          </div>
        </div>
        <div class="form-row">
          <div class="form-field">
            <label>Duration (min)</label>
            <input class="edit-input" type="number" min="1" [(ngModel)]="formDuration" placeholder="—">
          </div>
          <div class="form-field">
            <label>Laps</label>
            <input class="edit-input" type="number" min="1" [(ngModel)]="formLaps" placeholder="—">
          </div>
        </div>
        <div class="form-row">
          <div class="form-field">
            <label>Distance (km)</label>
            <input class="edit-input" type="number" min="0" step="0.1" [(ngModel)]="formDistance" placeholder="—">
          </div>
        </div>
        <div class="form-field">
          <label>Notes</label>
          <textarea class="edit-input" [(ngModel)]="formNotes" placeholder="Optional notes..."></textarea>
        </div>
        <button class="btn btn-primary" style="width:100%;margin-top:16px" (click)="saveActivity()">Save Activity</button>
      </ion-content>
    </ng-template>
  </ion-modal>

</ion-content>
