<ion-header [translucent]="true">
  <ion-toolbar>
    <ion-buttons slot="start">
      <ion-back-button defaultHref="/dashboard"></ion-back-button>
    </ion-buttons>
    <ion-title>Daily Metrics — {{ selectedDay() }}</ion-title>
    <ion-buttons slot="end">
      <ion-button (click)="syncHealth()" [disabled]="healthSvc.isSyncing()">
        <ion-icon slot="icon-only" [name]="healthSvc.isSyncing() ? 'sync-outline' : 'heart-outline'"></ion-icon>
      </ion-button>
    </ion-buttons>
  </ion-toolbar>
</ion-header>

<ion-content class="ion-padding-bottom">

  <!-- Health sync banner -->
  <div class="health-banner" *ngIf="healthBanner()">
    <ion-icon [name]="healthBannerIcon()" class="banner-icon"></ion-icon>
    <span>{{ healthBanner() }}</span>
    <button class="banner-close" (click)="healthBanner.set('')">✕</button>
  </div>

  <div class="card">
    <div class="card-header"><div class="card-title">Daily Movement</div></div>
    <div class="metrics-grid">
      <div class="metric-input">
        <label>Steps</label>
        <input type="number" [value]="dayData()?.steps" (change)="saveField('steps', $any($event.target).value)"
          [placeholder]="stepGoal()" min="0" max="99999">
      </div>
      <div class="metric-input">
        <label>Active Calories</label>
        <div class="health-readonly" [class.has-value]="dayData()?.calories">
          <ion-icon name="heart-outline" class="health-icon"></ion-icon>
          <span>{{ dayData()?.calories ? (dayData()!.calories + ' kcal') : 'Synced from health ❤️' }}</span>
        </div>
      </div>
    </div>
  </div>

  <div class="card">
    <div class="card-header"><div class="card-title">Nutrition</div></div>
    <div class="metrics-grid" style="margin-bottom:14px">
      <div class="metric-input" style="grid-column:1/-1">
        <label>Calorie Intake (kcal)</label>
        <input type="number" [value]="dayData()?.calorieIntake" (change)="saveField('calorieIntake', $any($event.target).value)"
          placeholder="e.g. 2000" min="0" max="9999">
      </div>
    </div>

    <div class="macros-header">
      <span class="macros-label">MACROS</span>
      <div class="macro-mode-toggle">
        <button class="unit-btn" [class.active]="macroMode()==='g'" (click)="macroMode.set('g')">g</button>
        <button class="unit-btn" [class.active]="macroMode()==='%'" (click)="macroMode.set('%')">%</button>
      </div>
    </div>

    <div class="macros-grid">
      <div class="metric-input">
        <label>Carbs {{ macroMode()==='%' ? '(%)' : '(g)' }}</label>
        <input type="number"
          [value]="macroMode()==='%' ? macroToPercent('carbs') : dayData()?.carbs"
          (change)="saveMacro('carbs', $any($event.target).value)"
          [placeholder]="macroMode()==='%' ? '45' : '150'" min="0" [max]="macroMode()==='%' ? '100' : '999'">
      </div>
      <div class="metric-input">
        <label>Protein {{ macroMode()==='%' ? '(%)' : '(g)' }}</label>
        <input type="number"
          [value]="macroMode()==='%' ? macroToPercent('protein') : dayData()?.protein"
          (change)="saveMacro('protein', $any($event.target).value)"
          [placeholder]="macroMode()==='%' ? '30' : '80'" min="0" [max]="macroMode()==='%' ? '100' : '999'">
      </div>
      <div class="metric-input">
        <label>Fat {{ macroMode()==='%' ? '(%)' : '(g)' }}</label>
        <input type="number"
          [value]="macroMode()==='%' ? macroToPercent('fat') : dayData()?.fat"
          (change)="saveMacro('fat', $any($event.target).value)"
          [placeholder]="macroMode()==='%' ? '25' : '40'" min="0" [max]="macroMode()==='%' ? '100' : '999'">
      </div>
    </div>
    <div *ngIf="macroSvg()" style="margin-top:12px" [innerHTML]="macroSvg()"></div>
  </div>

  <div class="card">
    <div class="card-header"><div class="card-title">Pain &amp; Body</div></div>
    <div class="pain-slider">
      <div class="pain-label-row">
        <label>Pain Level</label>
        <div class="pain-badge" [style.background]="painColor()">
          {{ dayData()?.pain || 0 }}<span>/10</span>
        </div>
      </div>
      <div class="pain-track">
        <input type="range" min="0" max="10" [value]="dayData()?.pain || 0"
          (input)="setPain(+$any($event.target).value)">
      </div>
      <div class="pain-scale-labels">
        <span>No pain</span><span>Moderate</span><span>Severe</span>
      </div>
    </div>
    <div class="metric-input" style="margin-top:14px">
      <label>Body Weight</label>
      <div style="display:flex;gap:8px">
        <input type="number" [value]="dayData()?.weight" (change)="saveField('weight', $any($event.target).value)"
          placeholder="70" min="0.1" max="700" step="0.1" style="flex:1">
        <div class="weight-unit-toggle">
          <button class="unit-btn" [class.active]="weightUnit()==='kg'" (click)="setWeightUnit('kg')">kg</button>
          <button class="unit-btn" [class.active]="weightUnit()==='lbs'" (click)="setWeightUnit('lbs')">lbs</button>
        </div>
      </div>
    </div>
  </div>

  <div class="card" *ngIf="medications().length">
    <div class="card-header"><div class="card-title">Medications</div></div>
    <div class="meds-check">
      <div class="med-item" *ngFor="let med of medications()">
        <input type="checkbox" [checked]="dayData()?.meds?.[med]"
          (change)="saveMed(med, $any($event.target).checked)">
        <span>{{ med }}</span>
      </div>
    </div>
  </div>

  <div class="card">
    <div class="card-header"><div class="card-title">Sleep</div></div>
    <div class="metric-input">
      <label>Sleep Hours</label>
      <input type="number" [value]="dayData()?.sleepHrs" (change)="saveField('sleepHrs', $any($event.target).value)"
        placeholder="7.5" min="0" max="24" step="0.5">
    </div>
    <div class="sleep-rating">
      <label>Sleep Quality</label>
      <div class="stars">
        <span *ngFor="let filled of stars(dayData()?.sleep || 0); let i = index"
          class="star" [class.filled]="filled"
          (click)="setSleepQuality(i+1)">★</span>
      </div>
    </div>
  </div>

  <div class="card">
    <div class="card-header"><div class="card-title">Notes</div></div>
    <div class="metric-input">
      <label>Personal Notes</label>
      <textarea [value]="dayData()?.notes || ''" (change)="saveField('notes', $any($event.target).value)"
        placeholder="How are you feeling today?"></textarea>
    </div>
    <div class="metric-input">
      <label>Therapist Notes</label>
      <textarea [value]="dayData()?.therapistNotes || ''" (change)="saveField('therapistNotes', $any($event.target).value)"
        placeholder="Notes from your therapist or doctor..."></textarea>
    </div>
  </div>

  <!-- 1RM Calculator -->
  <div class="card" style="margin-bottom: 16px">
    <div class="card-header"><div class="card-title">Strength Tools</div></div>
    <app-one-rm-calculator></app-one-rm-calculator>
  </div>

</ion-content>
